<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="url(#shine)"/>

  <!-- ── Graduation cap ── -->
  <!-- Board (rhombus) -->
  <polygon points="50,14 76,27 50,40 24,27" fill="white"/>
  <!-- Cap body / drop -->
  <path d="M36,27 L36,44 Q43,50 50,50 Q57,50 64,44 L64,27 L50,34 Z" fill="rgba(255,255,255,0.88)"/>
  <!-- Tassel string -->
  <line x1="76" y1="27" x2="76" y2="45" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="76" cy="48" r="3.2" fill="rgba(255,255,255,0.9)"/>

  <!-- ── Alumni (left) ── -->
  <circle cx="27" cy="67" r="8.5" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
  <!-- head -->
  <circle cx="27" cy="64.5" r="3.5" fill="white"/>
  <!-- body -->
  <path d="M20.5,75.5 Q20.5,70 27,70 Q33.5,70 33.5,75.5" fill="white"/>

  <!-- ── Student (right) ── -->
  <circle cx="73" cy="67" r="8.5" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
  <!-- head -->
  <circle cx="73" cy="64.5" r="3.5" fill="white"/>
  <!-- body -->
  <path d="M66.5,75.5 Q66.5,70 73,70 Q79.5,70 79.5,75.5" fill="white"/>

  <!-- ── Connection line ── -->
  <line x1="36" y1="67" x2="64" y2="67" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-dasharray="4.5,3"/>
  <!-- middle node -->
  <circle cx="50" cy="67" r="3.5" fill="white"/>
  <!-- small dots on each side -->
  <circle cx="36" cy="67" r="1.8" fill="rgba(255,255,255,0.8)"/>
  <circle cx="64" cy="67" r="1.8" fill="rgba(255,255,255,0.8)"/>
</svg>
