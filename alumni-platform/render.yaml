services:
  # ── Backend: Node.js Web Service ─────────────────────────────────────────────
  - type: web
    name: careersaathi-platform-backend
    env: node
    plan: free
    rootDir: careersaathi-platform/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to your frontend Render URL after frontend is deployed
      # e.g. https://careersaathi-platform-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false
      # ── Firebase Admin SDK ──────────────────────────────────────────────────
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_CLIENT_ID
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      # ── AI API Keys ─────────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false

  # ── Frontend: Static Site ─────────────────────────────────────────────────
  - type: web
    name: careersaathi-platform-frontend
    env: static
    rootDir: careersaathi-platform/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend Render URL + /api
      # e.g. https://careersaathi-platform-backend.onrender.com/api
      - key: VITE_API_BASE_URL
        sync: false
      # ── Firebase Client SDK ──────────────────────────────────────────────────
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_DATABASE_URL
        sync: false

